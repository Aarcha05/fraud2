services:
  - type: web
    name: fraudshield
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
```

The `rootDir: backend` tells Render to run commands from inside `backend/` where `requirements.txt` is.

