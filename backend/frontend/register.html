<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register – FraudShield</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #7c3aed;
            --text: #1a1a2e;
            --muted: #8888a8;
            --error: #e53e6d;
        }

        body {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f0e8ff 0%, #ffe0f5 45%, #e8eeff 100%);
            overflow: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
            pointer-events: none;
        }
        .orb-1 { width: 450px; height: 450px; background: #d4b0ff; top: -120px; right: -80px; }
        .orb-2 { width: 380px; height: 380px; background: #ffb0d8; bottom: -100px; left: -80px; }
        .orb-3 { width: 280px; height: 280px; background: #b0c8ff; top: 40%; left: 55%; transform: translate(-50%,-50%); }

        .card {
            background: rgba(255,255,255,0.58);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.88);
            border-radius: 30px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 10px 40px rgba(140,80,220,0.10),
                0 1px 0 rgba(255,255,255,1) inset;
            animation: rise 0.6s cubic-bezier(0.16,1,0.3,1) both;
            position: relative;
            z-index: 10;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(145deg, #fff, #f0e4ff);
            border: 1px solid rgba(255,255,255,0.95);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 14px rgba(120,60,220,0.15);
        }

        .logo-text {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.8px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .field { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.6px;
            text-transform: uppercase;
            margin-bottom: 7px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.55);
            border: 1px solid rgba(180,170,230,0.55);
            border-radius: 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }

        input::placeholder { color: #c0c0d8; }

        input:focus {
            border-color: rgba(124,58,237,0.4);
            background: rgba(255,255,255,0.82);
            box-shadow: 0 0 0 4px rgba(124,58,237,0.08);
        }

        input.error-input {
            border-color: rgba(229,62,109,0.5);
            box-shadow: 0 0 0 4px rgba(229,62,109,0.07);
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(160deg, #a16cf0, #7c3aed);
            color: white;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(124,58,237,0.3), 0 1px 0 rgba(255,255,255,0.18) inset;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(124,58,237,0.38);
        }

        .btn:active { transform: translateY(0); }

        .error {
            color: var(--error);
            font-size: 0.82rem;
            margin-top: 10px;
            text-align: center;
            min-height: 18px;
        }

        .footer-link {
            text-align: center;
            margin-top: 22px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link a:hover { opacity: 0.75; }
    </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card">
    <div class="logo">
        <div class="logo-icon">🛡️</div>
        <span class="logo-text">FraudShield</span>
    </div>

    <h2>Create account</h2>
    <p class="subtitle">Start detecting fraud in seconds</p>

    <form id="registerForm" method="POST" action="/register">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Choose a username" required>
        </div>
        <div class="field">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Create a password" required>
        </div>
        <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
        </div>

        <button type="submit" class="btn">Create Account</button>
        <p id="errorMsg" class="error"></p>
    </form>

    <p class="footer-link">Already have an account? <a href="login.html">Sign in</a></p>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const pw = document.getElementById('password').value;
        const cpw = document.getElementById('confirmPassword').value;
        const errMsg = document.getElementById('errorMsg');
        const confirmInput = document.getElementById('confirmPassword');
        if (pw !== cpw) {
            e.preventDefault();
            errMsg.textContent = 'Passwords do not match.';
            confirmInput.classList.add('error-input');
        } else {
            errMsg.textContent = '';
            confirmInput.classList.remove('error-input');
        }
    });
</script>
</body>
</html>
