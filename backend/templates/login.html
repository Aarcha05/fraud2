<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login – FraudShield</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #2563eb;
            --text: #1a1a2e;
            --muted: #8888a8;
            --input-bg: rgba(255,255,255,0.55);
            --input-border: rgba(180,190,230,0.6);
        }

        body {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #dce8ff 0%, #ece0ff 45%, #fce8f3 100%);
            overflow: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.6;
            pointer-events: none;
        }
        .orb-1 { width: 500px; height: 500px; background: #b0d0ff; top: -150px; left: -100px; }
        .orb-2 { width: 400px; height: 400px; background: #d9b0ff; bottom: -100px; right: -80px; }
        .orb-3 { width: 300px; height: 300px; background: #ffc6e8; top: 50%; left: 60%; transform: translate(-50%,-50%); }

        .card {
            background: rgba(255,255,255,0.58);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.88);
            border-radius: 30px;
            padding: 52px 48px;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 10px 40px rgba(100,120,220,0.12),
                0 1px 0 rgba(255,255,255,1) inset;
            animation: rise 0.6s cubic-bezier(0.16,1,0.3,1) both;
            position: relative;
            z-index: 10;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(145deg, #fff, #e4eeff);
            border: 1px solid rgba(255,255,255,0.95);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 14px rgba(80,110,230,0.15);
        }

        .logo-text {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.8px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 34px;
        }

        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.6px;
            text-transform: uppercase;
            margin-bottom: 7px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }

        input::placeholder { color: #c0c0d8; }

        input:focus {
            border-color: rgba(37,99,235,0.45);
            background: rgba(255,255,255,0.82);
            box-shadow: 0 0 0 4px rgba(37,99,235,0.08);
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(160deg, #4f8eff, #2563eb);
            color: white;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37,99,235,0.3), 0 1px 0 rgba(255,255,255,0.18) inset;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(37,99,235,0.38);
        }

        .btn:active { transform: translateY(0); }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 24px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: rgba(180,185,220,0.45);
        }
        .divider span { color: var(--muted); font-size: 0.78rem; }

        .footer-link {
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link a:hover { opacity: 0.75; }
    </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card">
    <div class="logo">
        <div class="logo-icon">🛡️</div>
        <span class="logo-text">FraudShield</span>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your account to continue</p>

    <form method="POST" action="/login">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Enter your username" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="divider"><span>or</span></div>
    {% if error %}
    <p style="color:#e53e6d; text-align:center; font-size:0.85rem; margin-top:12px;">{{ error }}</p>
    {% endif %}
    <p class="footer-link">Don't have an account? <a href="/register">Create one</a></p>
</div>
</body>
</html>
